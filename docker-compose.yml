services:
  mongodb:
    image: mongo:6.0.13
    volumes:
      - mongo-data:/data/db
    networks:
      - conformance-net

  # Conformance suite nginx (TLS reverse proxy for the Java server).
  # Service MUST be named "nginx" because the Java server's --startredir
  # flag hardcodes "redir :8443 nginx:8443".
  nginx:
    build:
      context: ./conformance-suite/nginx
    ports:
      - "8443:8443"
    volumes:
      - ./certs/nginx.crt:/etc/ssl/certs/nginx-selfsigned.crt:ro
      - ./certs/nginx.key:/etc/ssl/private/nginx-selfsigned.key:ro
    depends_on:
      - server
    networks:
      conformance-net:
        aliases:
          - localhost.emobix.co.uk

  # Conformance suite Java test server.
  server:
    build:
      context: ./conformance-suite/server-dev
    volumes:
      - ./conformance-suite/target/:/server/
      - ./certs/vouch.crt:/certs/vouch.crt:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        keytool -importcert -noprompt -alias vouch \
          -file /certs/vouch.crt \
          -keystore $$JAVA_HOME/lib/security/cacerts \
          -storepass changeit 2>/dev/null || true
        exec java \
          -jar /server/fapi-test-suite.jar \
          -Djdk.tls.maxHandshakeMessageSize=65536 \
          --fintechlabs.base_url=https://localhost.emobix.co.uk:8443 \
          --fintechlabs.devmode=true \
          --fintechlabs.startredir=true
    links:
      - mongodb:mongodb
    depends_on:
      - mongodb
    networks:
      - conformance-net
    logging:
      driver: "json-file"
      options:
        max-size: "500k"
        max-file: "5"

  # Vouch OIDC server (TLS on 443, mTLS on 8443).
  # VOUCH_TLS_CERT/KEY expect base64-encoded PEM content (set via env_file).
  vouch:
    build:
      context: ${VOUCH_REPO_PATH:-../vouch}
    ports:
      - "3000:80"
      - "9443:443"
      - "9444:8443"
    env_file:
      - path: certs/vouch-tls.env
        required: false
    environment:
      VOUCH_BASE_URL: "https://vouch"
      VOUCH_RP_ID: "vouch"
      VOUCH_RP_NAME: "Vouch Conformance"
      VOUCH_JWT_SECRET: "local-conformance-testing-secret-value-not-for-production"
      VOUCH_CERTIFICATION_TEST_TOKEN: "local-cert-test-token"
      VOUCH_SSH_CA_KEY_PATH: ""
      VOUCH_DATABASE_URL: "sqlite:/data/vouch.db?mode=rwc"
      VOUCH_TRUSTED_PROXIES: "0.0.0.0/0"
      VOUCH_MTLS_PORT: "8443"
      VOUCH_EXTRA_CA_CERTS: "/certs/nginx.crt"
    volumes:
      - vouch-data:/data
      - ./certs/nginx.crt:/certs/nginx.crt:ro
    networks:
      - conformance-net

networks:
  conformance-net:

volumes:
  mongo-data:
  vouch-data:
