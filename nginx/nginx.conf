events {
    worker_connections 128;
}

# TCP passthrough for mTLS — preserves the client cert in the TLS
# handshake so Vouch's native mTLS listener (port 8443) handles it.
stream {
    server {
        listen 8443;
        proxy_pass vouch:8443;
    }
}

http {
    # Standard TLS (no client cert required)
    server {
        listen 443 ssl;
        server_name vouch-proxy;

        ssl_certificate     /etc/ssl/certs/vouch-proxy.crt;
        ssl_certificate_key /etc/ssl/private/vouch-proxy.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_pass https://vouch:443;
            proxy_ssl_verify off;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}
